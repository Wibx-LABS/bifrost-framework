name: Bifrost Pre-Merge Check
on:
  pull_request:
    branches:
      - main

jobs:
  merge-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if .bifrost exists
        id: check_bifrost
        run: |
          if [ -d ".bifrost" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure Conductor Delivered
        if: steps.check_bifrost.outputs.exists == 'true'
        run: ./scripts/bifrost-validate state .bifrost/STATE.md --status=merged
      
      - name: Ensure No Blockers
        if: steps.check_bifrost.outputs.exists == 'true'
        run: ./scripts/bifrost-validate merge-ready
